<body>

<h2>Test Quote Form</h2>

<form id="quoteForm">
  <input type="text" id="fullName" placeholder="Full Name" required><br><br>
  <input type="email" id="email" placeholder="Email" required><br><br>
  <input type="tel" id="phone" placeholder="Phone" required><br><br>
  <button type="submit" id="submitBtn">Submit</button>
</form>

<p id="status"></p>

<script>
// ✅ FIXED SCRIPT URL
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxXAvzw4zV45FaQ0dbW1KjfQlE2URDytxPOvCsT4Ki5pgPRJY3qYQvs_qbZt9TQ54W7/exec";

document.getElementById("quoteForm").addEventListener("submit", function(e){
    e.preventDefault();

    const status = document.getElementById("status");
    const btn = document.getElementById("submitBtn");

    status.innerHTML = "";
    btn.disabled = true;
    btn.innerText = "Sending...";

    const formData = new FormData();
    formData.append("fullName", document.getElementById("fullName").value);
    formData.append("email", document.getElementById("email").value);
    formData.append("phone", document.getElementById("phone").value);

fetch(SCRIPT_URL, {
    method: "POST",
    body: formData
})

</script>

</body>
